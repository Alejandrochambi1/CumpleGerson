<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Invitación Mónaco | Gerson Salinas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8e8e8 0%, #f5f5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 16px;
        }

        /* ========== CARTA DE INVITACIÓN (splash inicial) ========== */
        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .letter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            display: none;
        }
        .envelope-card {
            background: transparent;
            border-radius: 32px;
            width: min(340px, 85%);
            text-align: center;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .carta-imagen {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
        }
        .btn-open-letter {
            background: linear-gradient(135deg, #5a7d9a, #3a5a7a);
            border: none;
            padding: 12px 24px;
            font-size: clamp(0.85rem, 4vw, 1rem);
            font-weight: 600;
            color: #ffffff;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 220px;
            letter-spacing: 1px;
        }
        .btn-open-letter:active { transform: scale(0.96); }

        /* ========== CONTENEDOR PRINCIPAL ========== */
        .login-container {
            position: relative;
            width: min(520px, 95%);
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
        .login-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Círculos animados responsivos */
        .circles-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate 20s linear infinite;
        }
        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: clamp(4px, 1.2vw, 6px) solid;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.7;
        }
        .circle:nth-child(1) { border-color: #e91e63; animation: pulse1 3s ease-in-out infinite; }
        .circle:nth-child(2) { border-color: #ffd700; animation: pulse2 3s ease-in-out infinite 0.5s; }
        .circle:nth-child(3) { border-color: #00bcd4; animation: pulse3 3s ease-in-out infinite 1s; }
        .circle:nth-child(4) { border-color: #9ccc65; animation: pulse4 3s ease-in-out infinite 1.5s; }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse1 { 0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; border-radius: 45% 55% 48% 52% / 42% 48% 52% 58%; } 25% { transform: translate(-50%, -50%) scale(1.02); opacity: 0.9; border-radius: 58% 42% 55% 45% / 48% 62% 38% 52%; } 50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; border-radius: 52% 48% 62% 38% / 53% 45% 55% 47%; } 75% { transform: translate(-50%, -50%) scale(0.98); opacity: 0.9; border-radius: 38% 62% 45% 55% / 58% 52% 48% 42%; } 100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; border-radius: 45% 55% 48% 52% / 42% 48% 52% 58%; } }
        @keyframes pulse2 { 0% { transform: translate(-50%, -50%) scale(0.92) rotate(10deg); opacity: 0.8; border-radius: 55% 45% 58% 42% / 52% 48% 52% 48%; } 25% { transform: translate(-50%, -50%) scale(1.0) rotate(10deg); opacity: 0.9; border-radius: 42% 58% 45% 55% / 48% 60% 40% 52%; } 50% { transform: translate(-50%, -50%) scale(1.08) rotate(10deg); opacity: 1; border-radius: 48% 52% 40% 60% / 55% 45% 55% 45%; } 75% { transform: translate(-50%, -50%) scale(1.0) rotate(10deg); opacity: 0.9; border-radius: 60% 40% 52% 48% / 42% 58% 42% 58%; } 100% { transform: translate(-50%, -50%) scale(0.92) rotate(10deg); opacity: 0.8; border-radius: 55% 45% 58% 42% / 52% 48% 52% 48%; } }
        @keyframes pulse3 { 0% { transform: translate(-50%, -50%) scale(0.98) rotate(-10deg); opacity: 0.8; border-radius: 40% 60% 52% 48% / 45% 55% 45% 55%; } 25% { transform: translate(-50%, -50%) scale(1.05) rotate(-10deg); opacity: 0.9; border-radius: 52% 48% 45% 55% / 58% 42% 58% 42%; } 50% { transform: translate(-50%, -50%) scale(1.02) rotate(-10deg); opacity: 1; border-radius: 60% 40% 58% 42% / 52% 48% 52% 48%; } 75% { transform: translate(-50%, -50%) scale(0.95) rotate(-10deg); opacity: 0.9; border-radius: 45% 55% 42% 58% / 40% 60% 40% 60%; } 100% { transform: translate(-50%, -50%) scale(0.98) rotate(-10deg); opacity: 0.8; border-radius: 40% 60% 52% 48% / 45% 55% 45% 55%; } }
        @keyframes pulse4 { 0% { transform: translate(-50%, -50%) scale(1) rotate(5deg); opacity: 0.8; border-radius: 48% 52% 55% 45% / 50% 50% 50% 50%; } 25% { transform: translate(-50%, -50%) scale(1.08) rotate(5deg); opacity: 0.9; border-radius: 62% 38% 48% 52% / 45% 55% 45% 55%; } 50% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 1; border-radius: 50% 50% 38% 62% / 58% 42% 58% 42%; } 75% { transform: translate(-50%, -50%) scale(1.05) rotate(5deg); opacity: 0.9; border-radius: 38% 62% 52% 48% / 52% 48% 52% 48%; } 100% { transform: translate(-50%, -50%) scale(1) rotate(5deg); opacity: 0.8; border-radius: 48% 52% 55% 45% / 50% 50% 50% 50%; } }

        /* ========== CAJA DE INVITACIÓN ========== */
        .login-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            padding: clamp(1.2rem, 5vw, 2rem) clamp(1rem, 4vw, 1.8rem);
            border-radius: 32px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .logo-monaco {
            width: min(85px, 20%);
            margin: 0 auto 0.5rem auto;
        }
        .logo-monaco img { width: 100%; height: auto; display: block; }

        h2 {
            color: #8b1538;
            margin-bottom: 0.2rem;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 600;
        }
        .subtitulo {
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            color: #5a5a5a;
            margin-bottom: 1rem;
            border-bottom: 1px solid #eee;
            display: inline-block;
            padding-bottom: 4px;
        }

        .foto-circular {
            width: min(90px, 22%);
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 0.8rem auto;
            border: 3px solid #8b1538;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .foto-circular img { width: 100%; height: 100%; object-fit: cover; }

        .nombre-celebrante {
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            font-weight: 800;
            color: #8b1538;
            margin: 0.2rem 0;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f5f0eb;
            padding: clamp(0.4rem, 2vw, 0.5rem) clamp(0.6rem, 3vw, 1rem);
            border-radius: 60px;
            margin-bottom: 0.6rem;
            font-size: clamp(0.7rem, 3.5vw, 0.85rem);
            font-weight: 500;
            color: #3a3a3a;
            flex-wrap: wrap;
        }
        .info-icon {
            width: clamp(18px, 5vw, 22px);
            height: clamp(18px, 5vw, 22px);
        }

        .descripcion {
            font-size: clamp(0.75rem, 3.5vw, 0.85rem);
            color: #555;
            margin: 1rem 0;
            line-height: 1.5;
        }

        .botones-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 1.2rem 0;
        }
        .btn-confirmar, .btn-no-asistir {
            padding: clamp(10px, 3vw, 12px);
            font-size: clamp(0.85rem, 4vw, 1rem);
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            border: none;
        }
        .btn-confirmar {
            background: #2c7a4d;
            color: white;
        }
        .btn-confirmar:hover { background: #1e5a38; }
        .btn-no-asistir {
            background: #8a5a3a;
            color: white;
        }
        .btn-no-asistir:hover { background: #6b4428; }

        /* Modal responsivo */
        .modal-nombre {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .modal-contenido {
            background: white;
            border-radius: 2rem;
            padding: clamp(1.2rem, 5vw, 2rem);
            max-width: 350px;
            width: 85%;
            text-align: center;
        }
        .modal-contenido h3 {
            color: #8b1538;
            margin-bottom: 1rem;
            font-size: clamp(1.1rem, 4.5vw, 1.3rem);
        }
        .modal-contenido input {
            width: 100%;
            padding: clamp(10px, 3vw, 12px);
            border-radius: 60px;
            border: 1px solid #ccc;
            margin-bottom: 1rem;
            font-size: clamp(0.85rem, 4vw, 1rem);
            text-align: center;
        }
        .modal-boton-enviar, .modal-boton-cerrar {
            padding: clamp(10px, 3vw, 12px);
            border-radius: 60px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: clamp(0.85rem, 4vw, 1rem);
        }
        .modal-boton-enviar {
            background: #2c7a4d;
            color: white;
            margin-bottom: 8px;
        }
        .modal-boton-cerrar {
            background: #ccc;
            color: #333;
        }
        footer {
            margin-top: 0.8rem;
            font-size: clamp(0.6rem, 3vw, 0.65rem);
            color: #aaa;
        }

        /* Botón de música */
        .music-control-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: clamp(0.65rem, 3vw, 0.75rem);
            font-weight: 600;
            color: #f0f0f0;
            cursor: pointer;
            z-index: 300;
            border: none;
            font-family: monospace;
            transition: 0.2s;
        }
        .music-control-btn:hover { background: #3a5a7a; }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 480px) {
            body { padding: 8px; }
            .info-item { gap: 6px; }
            .login-box { border-radius: 28px; }
        }
        @media (max-width: 360px) {
            .info-item span { font-size: 0.65rem; }
            .descripcion { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- CARTA INICIAL -->
    <div id="letterOverlay" class="letter-overlay">
        <div class="envelope-card" id="openLetterBtn">
            <img class="carta-imagen" src="https://i.ibb.co/N6mHXSbY/cartoon-doodle-linear-mail-letter-isolated-on-white-background-free-vector.png" alt="Carta invitacion">
            <button class="btn-open-letter" id="triggerOpen">ABRIR CARTA</button>
        </div>
    </div>

    <!-- CONTENEDOR PRINCIPAL CON CÍRCULOS ANIMADOS -->
    <div id="mainContainer" class="login-container">
        <div class="circles-wrapper">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="login-box">
            <div class="logo-monaco">
                <img src="https://i.ibb.co/5XH7bQYC/monaco-300x300-1-1.png" alt="Monaco">
            </div>
            <h2>Gerson Salinas</h2>
            <div class="subtitulo">GRAN CELEBRACION</div>
            <div class="foto-circular">
                <img src="https://i.wpfc.ml/h1/typo19.jpg" alt="Gerson">
            </div>
            <div class="info-item">
                <img class="info-icon" src="https://cdn-icons-png.flaticon.com/512/2693/2693507.png" alt="calendario" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2838/2838912.png'">
                <span>SABADO 20 DE JUNIO · 11:00 PM</span>
            </div>
            <div class="info-item">
                <img class="info-icon" src="https://cdn-icons-png.flaticon.com/512/7636/7636145.png" alt="ubicacion" onerror="this.src='https://cdn-icons-png.flaticon.com/512/535/535239.png'">
                <span>DISCOTECA MONACO · ZONA VIVA</span>
            </div>
            <div class="descripcion">
                Una noche de elegancia, musica en vivo, brindis y sorpresas.<br>
                Te esperamos para compartir momentos inolvidables.
            </div>
            <div class="botones-container">
                <button class="btn-confirmar" id="btnConfirmarSi">CONFIRMAR ASISTENCIA</button>
                <button class="btn-no-asistir" id="btnConfirmarNo">NO PODRE ASISTIR</button>
            </div>
            <footer>Confirma tu asistencia</footer>
        </div>
    </div>

    <!-- MODAL PARA NOMBRE -->
    <div id="modalNombre" class="modal-nombre">
        <div class="modal-contenido">
            <h3>Confirma tu asistencia</h3>
            <input type="text" id="nombreInvitado" placeholder="Tu nombre completo" autocomplete="off">
            <button id="enviarConfirmacion" class="modal-boton-enviar">ENVIAR POR WHATSAPP</button>
            <button id="cerrarModal" class="modal-boton-cerrar">Cancelar</button>
        </div>
    </div>

    <!-- ESCORPION AUTONOMO (canvas) -->
    <canvas id="scorpionCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 150;"></canvas>

    <!-- BOTON DE MUSICA -->
    <div id="musicControlBtn" class="music-control-btn">PAUSAR MUSICA</div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.image2url.com/r2/default/audio/1781354654394-aa5dc764-ae2f-47b1-add9-40462018ecdb.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== CARTA Y MUSICA ==========
        const overlay = document.getElementById('letterOverlay');
        const mainContainer = document.getElementById('mainContainer');
        const openBtn = document.getElementById('triggerOpen');
        const musicBtn = document.getElementById('musicControlBtn');
        const audioEl = document.getElementById('bgMusic');
        
        let musicPlaying = false;
        let musicStarted = false;
        
        function startMusic() {
            if (!musicStarted) {
                audioEl.volume = 0.55;
                audioEl.play().then(() => {
                    musicPlaying = true;
                    musicStarted = true;
                    musicBtn.innerHTML = 'PAUSAR MUSICA';
                }).catch(() => { musicBtn.innerHTML = 'ACTIVAR MUSICA'; });
            } else if (!musicPlaying) {
                audioEl.play().then(() => {
                    musicPlaying = true;
                    musicBtn.innerHTML = 'PAUSAR MUSICA';
                }).catch(() => {});
            }
        }
        
        function pauseMusic() {
            if (musicPlaying) {
                audioEl.pause();
                musicPlaying = false;
                musicBtn.innerHTML = 'REANUDAR MUSICA';
            } else {
                audioEl.play().then(() => {
                    musicPlaying = true;
                    musicBtn.innerHTML = 'PAUSAR MUSICA';
                }).catch(()=>{});
            }
        }
        
        function openInvitation() {
            overlay.classList.add('hidden');
            mainContainer.classList.add('visible');
            musicBtn.style.display = 'block';
            startMusic();
        }
        
        openBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openInvitation();
        });
        
        const cartaDiv = document.querySelector('.envelope-card');
        cartaDiv.addEventListener('click', (e) => {
            if(e.target !== openBtn) openInvitation();
        });
        
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) startMusic();
            else pauseMusic();
        });
        
        // ========== WHATSAPP CONFIRMACION ==========
        const TELEFONO_GERSON = "59172977769";
        const btnSi = document.getElementById('btnConfirmarSi');
        const btnNo = document.getElementById('btnConfirmarNo');
        const modalNombre = document.getElementById('modalNombre');
        const inputNombre = document.getElementById('nombreInvitado');
        const btnEnviar = document.getElementById('enviarConfirmacion');
        const btnCerrarModal = document.getElementById('cerrarModal');
        
        btnSi.addEventListener('click', () => {
            modalNombre.style.display = 'flex';
            inputNombre.value = '';
            setTimeout(() => inputNombre.focus(), 100);
        });
        
        btnCerrarModal.addEventListener('click', () => {
            modalNombre.style.display = 'none';
        });
        modalNombre.addEventListener('click', (e) => {
            if (e.target === modalNombre) modalNombre.style.display = 'none';
        });
        
        btnEnviar.addEventListener('click', () => {
            let nombre = inputNombre.value.trim();
            if (nombre === "") {
                alert("Por favor, ingresa tu nombre completo.");
                return;
            }
            const nombreFormateado = nombre.toLowerCase().replace(/\b\w/g, letra => letra.toUpperCase());
            const mensaje = `Hola Gerson, soy *${nombreFormateado}* y confirmo mi asistencia a tu fiesta del sabado 20 de junio en Discoteca Monaco. Alli estaremos celebrando contigo.`;
            const url = `https://wa.me/${TELEFONO_GERSON}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
            modalNombre.style.display = 'none';
        });
        
        btnNo.addEventListener('click', () => {
            const mensaje = `Hola Gerson, lamentablemente no podre asistir a tu fiesta del sabado 20 de junio. Te deseo una feliz celebracion y que la pases genial. Un abrazo.`;
            const url = `https://wa.me/${TELEFONO_GERSON}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        });
        
        // ========== ESCORPION AUTONOMO ==========
        (function() {
            const canvas = document.getElementById('scorpionCanvas');
            if (!canvas) return;
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            const ctx = canvas.getContext('2d');
            let targetX = canvas.width / 2, targetY = canvas.height / 2;
            function generarNuevoObjetivo() {
                targetX = Math.random() * canvas.width;
                targetY = Math.random() * canvas.height;
                targetX = Math.min(Math.max(targetX, 40), canvas.width - 40);
                targetY = Math.min(Math.max(targetY, 40), canvas.height - 40);
            }
            setInterval(generarNuevoObjetivo, 3200);
            
            class Segment {
                constructor(parent, size, angle, range, stiffness) {
                    this.isSegment = true;
                    this.parent = parent;
                    if (typeof parent.children === "object") parent.children.push(this);
                    this.children = [];
                    this.size = size * 0.5;
                    this.relAngle = angle;
                    this.defAngle = angle;
                    this.absAngle = parent.absAngle + angle;
                    this.range = range;
                    this.stiffness = stiffness;
                    this.updateRelative(false, true);
                }
                updateRelative(iter, flex) {
                    this.relAngle = this.relAngle - 2 * Math.PI * Math.floor((this.relAngle - this.defAngle) / (2 * Math.PI) + 0.5);
                    if (flex) {
                        this.relAngle = Math.min(this.defAngle + this.range / 2, Math.max(this.defAngle - this.range / 2, (this.relAngle - this.defAngle) / this.stiffness + this.defAngle));
                    }
                    this.absAngle = this.parent.absAngle + this.relAngle;
                    this.x = this.parent.x + Math.cos(this.absAngle) * this.size;
                    this.y = this.parent.y + Math.sin(this.absAngle) * this.size;
                    if (iter) for (let i = 0; i < this.children.length; i++) this.children[i].updateRelative(iter, flex);
                }
                draw(iter) {
                    ctx.beginPath();
                    ctx.moveTo(this.parent.x, this.parent.y);
                    ctx.lineTo(this.x, this.y);
                    ctx.stroke();
                    if (iter) for (let i = 0; i < this.children.length; i++) this.children[i].draw(true);
                }
                follow(iter) {
                    let x = this.parent.x, y = this.parent.y;
                    let dist = Math.hypot(this.x - x, this.y - y);
                    this.x = x + this.size * (this.x - x) / dist;
                    this.y = y + this.size * (this.y - y) / dist;
                    this.absAngle = Math.atan2(this.y - y, this.x - x);
                    this.relAngle = this.absAngle - this.parent.absAngle;
                    this.updateRelative(false, true);
                    if (iter) for (let i = 0; i < this.children.length; i++) this.children[i].follow(true);
                }
            }
            
            class LimbSystem {
                constructor(end, length, speed, creature) {
                    this.end = end;
                    this.length = Math.max(1, length);
                    this.creature = creature;
                    this.speed = speed;
                    creature.systems.push(this);
                    this.nodes = [];
                    let node = end;
                    for (let i = 0; i < length; i++) {
                        this.nodes.unshift(node);
                        node = node.parent;
                        if (!node.isSegment) { this.length = i + 1; break; }
                    }
                    this.hip = this.nodes[0].parent;
                }
                moveTo(x, y) {
                    this.nodes[0].updateRelative(true, true);
                    let dist = Math.hypot(x - this.end.x, y - this.end.y);
                    let len = Math.max(0, dist - this.speed);
                    for (let i = this.nodes.length - 1; i >= 0; i--) {
                        let node = this.nodes[i];
                        let ang = Math.atan2(node.y - y, node.x - x);
                        node.x = x + len * Math.cos(ang);
                        node.y = y + len * Math.sin(ang);
                        x = node.x; y = node.y;
                        len = node.size;
                    }
                    for (let i = 0; i < this.nodes.length; i++) {
                        let node = this.nodes[i];
                        node.absAngle = Math.atan2(node.y - node.parent.y, node.x - node.parent.x);
                        node.relAngle = node.absAngle - node.parent.absAngle;
                        for (let ii = 0; ii < node.children.length; ii++) {
                            let child = node.children[ii];
                            if (!this.nodes.includes(child)) child.updateRelative(true, false);
                        }
                    }
                }
                update(x, y) { this.moveTo(x, y); }
            }
            
            class LegSystem extends LimbSystem {
                constructor(end, length, speed, creature) {
                    super(end, length, speed, creature);
                    this.goalX = end.x; this.goalY = end.y;
                    this.step = 0; this.forwardness = 0;
                    this.reach = 0.9 * Math.hypot(this.end.x - this.hip.x, this.end.y - this.hip.y);
                    let relAngle = this.creature.absAngle - Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x);
                    relAngle -= 2 * Math.PI * Math.floor(relAngle / (2 * Math.PI) + 0.5);
                    this.swing = -relAngle + (2 * (relAngle < 0) - 1) * Math.PI / 2;
                    this.swingOffset = this.creature.absAngle - this.hip.absAngle;
                }
                update(x, y) {
                    this.moveTo(this.goalX, this.goalY);
                    if (this.step === 0) {
                        let dist = Math.hypot(this.end.x - this.goalX, this.end.y - this.goalY);
                        if (dist > 1) {
                            this.step = 1;
                            this.goalX = this.hip.x + this.reach * Math.cos(this.swing + this.hip.absAngle + this.swingOffset) + (2 * Math.random() - 1) * this.reach / 2;
                            this.goalY = this.hip.y + this.reach * Math.sin(this.swing + this.hip.absAngle + this.swingOffset) + (2 * Math.random() - 1) * this.reach / 2;
                        }
                    } else if (this.step === 1) {
                        let theta = Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x) - this.hip.absAngle;
                        let dist = Math.hypot(this.end.x - this.hip.x, this.end.y - this.hip.y);
                        let forwardness2 = dist * Math.cos(theta);
                        let dF = this.forwardness - forwardness2;
                        this.forwardness = forwardness2;
                        if (dF * dF < 1) {
                            this.step = 0;
                            this.goalX = this.hip.x + (this.end.x - this.hip.x);
                            this.goalY = this.hip.y + (this.end.y - this.hip.y);
                        }
                    }
                }
            }
            
            class Creature {
                constructor(x, y, angle, fAccel, fFric, fRes, fThresh, rAccel, rFric, rRes, rThresh) {
                    this.x = x; this.y = y; this.absAngle = angle;
                    this.fSpeed = 0; this.fAccel = fAccel; this.fFric = fFric; this.fRes = fRes; this.fThresh = fThresh;
                    this.rSpeed = 0; this.rAccel = rAccel; this.rFric = rFric; this.rRes = rRes; this.rThresh = rThresh;
                    this.children = [];
                    this.systems = [];
                }
                follow(x, y) {
                    let dist = Math.hypot(this.x - x, this.y - y);
                    let angle = Math.atan2(y - this.y, x - this.x);
                    let accel = this.fAccel;
                    if (this.systems.length) {
                        let sum = 0;
                        for (let i = 0; i < this.systems.length; i++) sum += this.systems[i].step === 0;
                        accel *= sum / this.systems.length;
                    }
                    this.fSpeed += accel * (dist > this.fThresh);
                    this.fSpeed *= 1 - this.fRes;
                    let speed = Math.max(0, this.fSpeed - this.fFric);
                    let dif = this.absAngle - angle;
                    dif -= 2 * Math.PI * Math.floor(dif / (2 * Math.PI) + 0.5);
                    if (Math.abs(dif) > this.rThresh && dist > this.fThresh) this.rSpeed -= this.rAccel * (2 * (dif > 0) - 1);
                    this.rSpeed *= 1 - this.rRes;
                    if (Math.abs(this.rSpeed) > this.rFric) this.rSpeed -= this.rFric * (2 * (this.rSpeed > 0) - 1);
                    else this.rSpeed = 0;
                    this.absAngle += this.rSpeed;
                    this.absAngle -= 2 * Math.PI * Math.floor(this.absAngle / (2 * Math.PI) + 0.5);
                    this.x += speed * Math.cos(this.absAngle);
                    this.y += speed * Math.sin(this.absAngle);
                    this.absAngle += Math.PI;
                    for (let i = 0; i < this.children.length; i++) this.children[i].follow(true);
                    for (let i = 0; i < this.systems.length; i++) this.systems[i].update(x, y);
                    this.absAngle -= Math.PI;
                    this.draw(true);
                }
                draw(iter) {
                    let r = 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, Math.PI / 4 + this.absAngle, 7 * Math.PI / 4 + this.absAngle);
                    ctx.moveTo(this.x + r * Math.cos(7 * Math.PI / 4 + this.absAngle), this.y + r * Math.sin(7 * Math.PI / 4 + this.absAngle));
                    ctx.lineTo(this.x + r * Math.cos(this.absAngle) * Math.SQRT2, this.y + r * Math.sin(this.absAngle) * Math.SQRT2);
                    ctx.lineTo(this.x + r * Math.cos(Math.PI / 4 + this.absAngle), this.y + r * Math.sin(Math.PI / 4 + this.absAngle));
                    ctx.stroke();
                    if (iter) for (let i = 0; i < this.children.length; i++) this.children[i].draw(true);
                }
            }
            
            function setupLizard(size, legs, tail) {
                let s = size * 0.45;
                let critter = new Creature(canvas.width / 2, canvas.height / 2, 0, s * 10, s * 2, 0.5, 16, 0.5, 0.085, 0.5, 0.3);
                let spinal = critter;
                for (let i = 0; i < 5; i++) {
                    spinal = new Segment(spinal, s * 3.2, 0, 3.1415 * 2 / 3, 1.1);
                    for (let ii = -1; ii <= 1; ii += 2) {
                        let node = new Segment(spinal, s * 2, ii, 0.1, 2);
                        for (let iii = 0; iii < 2; iii++) node = new Segment(node, s * 0.7, -ii * 0.1, 0.1, 2);
                    }
                }
                for (let i = 0; i < legs; i++) {
                    if (i > 0) {
                        for (let ii = 0; ii < 4; ii++) {
                            spinal = new Segment(spinal, s * 3.2, 0, 1.571, 1.5);
                            for (let iii = -1; iii <= 1; iii += 2) {
                                let node = new Segment(spinal, s * 2, iii * 1.571, 0.1, 1.5);
                                for (let iv = 0; iv < 2; iv++) node = new Segment(node, s * 2, -iii * 0.3, 0.1, 2);
                            }
                        }
                    }
                    for (let ii = -1; ii <= 1; ii += 2) {
                        let node = new Segment(spinal, s * 8, ii * 0.785, 0, 8);
                        node = new Segment(node, s * 10, -ii * 0.785, 6.28, 1);
                        node = new Segment(node, s * 10, ii * 1.571, 3.1415, 2);
                        for (let iii = 0; iii < 3; iii++) new Segment(node, s * 2.5, (iii / 2 - 0.5) * 1.571, 0.1, 4);
                        new LegSystem(node, 2, s * 8, critter);
                    }
                }
                for (let i = 0; i < tail; i++) {
                    spinal = new Segment(spinal, s * 3.2, 0, 3.1415 * 2 / 3, 1.1);
                    for (let ii = -1; ii <= 1; ii += 2) {
                        let node = new Segment(spinal, s * 2, ii, 0.1, 2);
                        for (let iii = 0; iii < 2; iii++) node = new Segment(node, s * 2 * (tail - i) / tail, -ii * 0.1, 0.1, 2);
                    }
                }
                return critter;
            }
            
            ctx.strokeStyle = "#8b5a2b";
            ctx.lineWidth = 1.8;
            let legNum = Math.floor(5 + Math.random() * 3);
            let critter = setupLizard(6, legNum, Math.floor(5 + Math.random() * 6));
            critter.x = Math.random() * canvas.width;
            critter.y = Math.random() * canvas.height;
            targetX = critter.x;
            targetY = critter.y;
            generarNuevoObjetivo();
            
            function animateScorpion() {
                if (!canvas || !ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                critter.follow(targetX, targetY);
                requestAnimationFrame(animateScorpion);
            }
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                targetX = Math.min(Math.max(targetX, 40), canvas.width - 40);
                targetY = Math.min(Math.max(targetY, 40), canvas.height - 40);
                if (critter) {
                    if (critter.x > canvas.width || critter.x < 0) critter.x = canvas.width / 2;
                    if (critter.y > canvas.height || critter.y < 0) critter.y = canvas.height / 2;
                }
            });
            animateScorpion();
        })();
    </script>
